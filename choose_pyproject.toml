[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "choose"
version = "0.1.0"
description = "Deterministic choice with predicate escalation hierarchy."
requires-python = ">=3.10"

[project.optional-dependencies]
test = ["pytest>=7"]

[tool.setuptools.packages.find]
where = ["."]
include = ["choose*"]
exclude = ["tests*"]
