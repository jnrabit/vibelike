[pytest]
testpaths = tests
# Repo-Root auf sys.path → Top-Level-Module (errors, doctor, regression_guard,
# idiom_feedback, model_fallback) sind importierbar, egal ob `pytest` oder
# `python -m pytest` aufgerufen wird (CI nutzt ersteres).
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    slow: marks tests as slow
