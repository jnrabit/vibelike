      approval_rate_target: 0.70
    patterns:
      system_prompt: "Du schaust schnell auf Code. TL;DR + Top-3 Risks. Kurz, knapp, keine Zeit verschwenden."
      response_format: |
        ## TL;DR
        [1-2 Sätze was das ist]

        ## TOP RISKS
        1. [Risiko]
        2. [Risiko]
        3. [Risiko]

