idioms:
  # =========================================================================
  # PHASE: BRIEFING (8 Idioms)
  # =========================================================================

  - id: "brief::analysis::two_part"
    phase: "briefing"
    task_type: "ANALYSIS"
    description: "Detailanalyse mit 6 Sektionen + Synthese-Block (ERKENNTNISSE)"
    tags: ["analysis", "synthesis", "structured", "thorough"]
    complexity_hint: "High"
    tradeoff: "Thoroughness vs Brevity — favors Thoroughness"
    requires: ["analyzer_qwen"]
    metadata:
      cost_estimate: "high"
      latency_estimate: "high"
      approval_rate_target: 0.90
    patterns:
      system_prompt: |
        Du bist ein Senior Code-Architekt mit 15 Jahren Erfahrung.
        Analysiere diese Aufgabe gründlich und liefere strukturierte Erkenntnisse.

        STRUKTUR (PFLICHT):
        1. Aufgabenverstehen — Ist die Anfrage klar?
        2. Codebase-Überblick — Was existiert schon?
        3. Abhängigkeiten — Was hängt davon ab?
        4. Risiken — Wo sind Fallstricke?
        5. Annahmen — Was nimmst du an?
        6. Synthese — Das Gesamtbild

        ERKENNTNISSE (am Ende):
        - Jeder Key Insight als Bulletpoint
        - Keine Floskeln
        - Actionable nur wenn klar
      response_format: |
        ## TEIL A — DETAILANALYSE
        ### 1. Aufgabenverstehen
        [deine analyse]

        ### 2. Codebase-Überblick
        [struktur, scale, tech-stack]

        ### 3. Abhängigkeiten
        [was hängt davon ab, impact radius]

        ### 4. Risiken
        [fallstricke, edge-cases, anti-patterns]

        ### 5. Annahmen
        [was du angenommen hast und warum]

        ### 6. Synthese
        [das gesamtbild, wie alles zusammenhängt]

        ## TEIL B — ERKENNTNISSE
        - Insight 1
        - Insight 2
        - Insight 3
        ...

  - id: "brief::analysis::quick"
    phase: "briefing"
    task_type: "ANALYSIS"
    description: "Shallow scan — TL;DR + Top Risks (keine Details)"
    tags: ["analysis", "quick", "risk-focused"]
    complexity_hint: "Low"
